name: Publish

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      release_name:
        description: "Exact release name (tag) in ToolboxPlugins to fetch plugins artifacts from"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      has_releases: ${{ steps.resolve.outputs.has_releases }}
    steps:
      - name: Generate app token to access private repo
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PRIVATE_PLUGINS_CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_PLUGINS_KEY }}
          owner: gam415
          repositories: ToolboxPlugins

      - name: Resolve releases to publish
        id: resolve
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_NAME: ${{ inputs.release_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_NAME=$(echo "$RELEASE_NAME" | tr -d '[:space:]')
            if [ -z "$RELEASE_NAME" ]; then
              echo "::error::release_name input is empty or whitespace-only"
              exit 1
            fi
            MATRIX=$(jq -cn --arg r "$RELEASE_NAME" '{include: [{release_name: $r}]}')
          else
            RELEASES=$(gh release list --repo gam415/ToolboxPlugins --limit 50 --json tagName,isPrerelease)
            MATRIX=$(printf '%s' "$RELEASES" | jq -c '{
              include: [
                (map(select(.isPrerelease == false)) | first | {release_name: .tagName}),
                (map(select(.isPrerelease == true)) | first | {release_name: .tagName})
              ] | map(select(.release_name != null))
            }')
          fi

          COUNT=$(printf '%s' "$MATRIX" | jq '.include | length')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No releases found in gam415/ToolboxPlugins, nothing to publish."
            echo "has_releases=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_releases=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: resolve
    if: needs.resolve.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}
      fail-fast: false
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Generate app token to access private repo
        id: private-plugins-app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PRIVATE_PLUGINS_CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_PLUGINS_KEY }}
          owner: gam415
          repositories: ToolboxPlugins

      - name: Fetch source release metadata
        id: source
        env:
          GH_TOKEN: ${{ steps.private-plugins-app-token.outputs.token }}
          RELEASE_NAME: ${{ matrix.release_name }}
        run: |
          set -euo pipefail

          echo "Fetching release '${RELEASE_NAME}' from gam415/ToolboxPlugins..."
          RELEASE_JSON=$(gh release view "$RELEASE_NAME" \
            --repo gam415/ToolboxPlugins \
            --json tagName,name,isPrerelease,body)

          IS_PRERELEASE=$(printf '%s' "$RELEASE_JSON" | jq -r '.isPrerelease')
          TAG_NAME=$(printf '%s' "$RELEASE_JSON" | jq -r '.tagName')
          RELEASE_TITLE=$(printf '%s' "$RELEASE_JSON" | jq -r '.name // .tagName')

          echo "Source tag: ${TAG_NAME}, title: ${RELEASE_TITLE}, prerelease: ${IS_PRERELEASE}"

          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_title=${RELEASE_TITLE}" >> "$GITHUB_OUTPUT"

          printf '%s' "$RELEASE_JSON" | jq -r '.body // ""' > "$RUNNER_TEMP/source_body.txt"

      - name: Check if release already exists
        id: check_existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.source.outputs.tag_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release '${TAG_NAME}' already exists in this repository. Skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release '${TAG_NAME}' does not exist yet. Proceeding."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts from source release
        if: steps.check_existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ steps.private-plugins-app-token.outputs.token }}
          RELEASE_TAG: ${{ steps.source.outputs.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p ./artifacts
          gh release download "$RELEASE_TAG" \
            --repo gam415/ToolboxPlugins \
            --dir ./artifacts
          echo "Downloaded artifacts:"
          ls -la ./artifacts/

      - name: Install Cosign
        if: steps.check_existing.outputs.exists != 'true'
        uses: sigstore/cosign-installer@v4.1.1

      - name: Verify ToolboxPlugins artifacts
        if: steps.check_existing.outputs.exists != 'true'
        run: |
          set -euo pipefail
          for file in ./artifacts/*.dll; do
            cosign verify-blob \
              --bundle "${file}.sigstore.json" \
              --certificate-identity-regexp "https://github.com/gam415/ToolboxPlugins" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$file"
          done

      - name: Build release body
        if: steps.check_existing.outputs.exists != 'true'
        run: |
          set -euo pipefail
          SOURCE="$RUNNER_TEMP/source_body.txt"
          BODY_FILE="$RUNNER_TEMP/release_body.md"

          if ! grep -q '^## Plugins Versions$' "$SOURCE"; then
            echo "::error::No '## Plugins Versions' section found in source release body"
            exit 1
          fi

          # Everything before "## Plugins Versions" stays as-is
          awk '/^## Plugins Versions$/{exit} {print}' "$SOURCE" > "$BODY_FILE"

          # Strip trailing whitespace and trailing blank lines
          sed -i 's/[[:space:]]*$//' "$BODY_FILE"
          sed -i -e '/^[[:space:]]*$/{:a;$d;N;ba}' "$BODY_FILE"

          # Append separator and folded plugins versions block
          {
            echo ""
            echo "---"
            echo ""
            echo "<details>"
            echo "<summary>Plugins versions</summary>"
            echo ""
            awk '/^## Plugins Versions$/{found=1; next} found{print}' "$SOURCE"
            echo "</details>"
          } >> "$BODY_FILE"

          echo "--- Release body ---"
          cat "$BODY_FILE"

      - name: Attest
        if: steps.check_existing.outputs.exists != 'true'
        uses: actions/attest@v4
        with:
          subject-path: ./artifacts/*.dll

      - name: Create release
        if: steps.check_existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.source.outputs.tag_name }}
          RELEASE_TITLE: ${{ steps.source.outputs.release_title }}
          IS_PRERELEASE: ${{ steps.source.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          ARGS=(
            "$TAG_NAME"
            --repo "$GITHUB_REPOSITORY"
            --title "$RELEASE_TITLE"
            --notes-file "$RUNNER_TEMP/release_body.md"
          )

          if [ "$IS_PRERELEASE" = "true" ]; then
            ARGS+=(--prerelease --latest)
          else
            ARGS+=(--latest)
          fi

          ARGS+=("./artifacts/"*)

          gh release create "${ARGS[@]}"

          echo "Release '${RELEASE_TITLE}' (${TAG_NAME}) created successfully."
